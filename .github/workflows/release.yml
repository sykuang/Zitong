name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build & publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization vars intentionally omitted: this project signs with a
          # free Apple Development cert which cannot notarize. Tauri attempts
          # notarization whenever any of APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
          # is present in the environment (even as an empty string from a missing
          # secret), and then fails with "Team ID must be at least 3 characters".
          # Re-add these (sourced from real secrets) only if the project moves to
          # a paid Apple Developer Program account.
        with:
          # Tag-push runs publish under the actual tag (e.g. v0.2.2). Manual
          # dispatches publish under a disposable test- tag so we can validate
          # the pipeline (including latest.json) without colliding with real
          # releases. Delete the resulting draft release after validation.
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('test-{0}', github.run_id) || github.ref_name }}
          releaseName: "Zitong __VERSION__"
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          prerelease: false
          generateReleaseNotes: true
          # Enable signed updater artifacts only for release builds. The repo
          # default in tauri.conf.json is `createUpdaterArtifacts: false` so a
          # fresh `git clone && npm run tauri -- build` works without the
          # TAURI_SIGNING_PRIVATE_KEY secret.
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json
